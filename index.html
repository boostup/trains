<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prochains départs</title>

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#111827">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>

<body>

    <div class="container">
        <div class="header">
            <div class="route-title" id="routeDisplay">Localisation...</div>
            <div class="route-sub" id="modeDisplay">Géolocalisation Active</div>
        </div>

        <div class="toggle-row">
            <label class="toggle-label">
                <span>Auto</span>
                <label class="switch">
                    <input id="autoToggle" type="checkbox" />
                    <span class="slider"></span>
                </label>
            </label>
        </div>

        <div class="controls">
            <input id="destInput" class="dest-input" placeholder="Destination (ex: Vichy)" autocomplete="off" />
            <button id="destBtn" class="refresh-btn">OK</button>
            <div id="destSuggestions" class="suggestions" aria-label="Suggestions de gares" role="listbox"></div>
        </div>

        <div id="board">
            <div class="loader">Calcul de la position GPS...</div>
        </div>

        <button class="refresh-btn" onclick="initTransit()">Actualiser</button>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
